# Valkey Sentinel configuration
# Monitors valkey-master and manages failover

port 26379
dir /tmp

# Monitor the master (resolved by Docker DNS)
sentinel monitor valkey-primary 172.35.0.30 6379 2
sentinel auth-pass valkey-primary changeme_valkey_2025
sentinel down-after-milliseconds valkey-primary 5000
sentinel failover-timeout valkey-primary 10000
sentinel parallel-syncs valkey-primary 1

# Sentinel auth (same password as Valkey for simplicity)
requirepass changeme_valkey_2025
sentinel sentinel-pass changeme_valkey_2025
