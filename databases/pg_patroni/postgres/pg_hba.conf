# pg_hba.conf — Patroni manages this, but we provide a base template
# Patroni will overwrite this during bootstrap, so the authoritative
# config is in patroni.yml's bootstrap.pg_hba and postgresql.pg_hba sections.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    replication     replicator      127.0.0.1/32            scram-sha-256
host    replication     replicator      172.35.0.0/16           scram-sha-256
host    all             all             172.35.0.0/16           scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256
