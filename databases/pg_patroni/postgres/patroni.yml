scope: pg-patroni
name: PATRONI_NAME

restapi:
  listen: 0.0.0.0:8008
  connect_address: PATRONI_NAME:8008

etcd3:
  hosts:
    - etcd1:2379
    - etcd2:2379
    - etcd3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_mode_strict: false
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        # Connection
        max_connections: 100
        listen_addresses: '*'

        # Replication
        wal_level: replica
        max_wal_senders: 10
        max_replication_slots: 10
        hot_standby: 'on'
        hot_standby_feedback: 'on'
        synchronous_commit: 'on'
        wal_log_hints: 'on'

        # Memory (conservative for 1.9GB Docker VM)
        shared_buffers: '128MB'
        effective_cache_size: '256MB'
        work_mem: '4MB'
        maintenance_work_mem: '64MB'

        # WAL
        wal_buffers: '4MB'
        min_wal_size: '64MB'
        max_wal_size: '256MB'
        checkpoint_completion_target: 0.9
        checkpoint_timeout: '10min'

        # Logging
        log_destination: 'stderr'
        logging_collector: 'off'
        log_min_duration_statement: 1000
        log_checkpoints: 'on'
        log_connections: 'off'
        log_disconnections: 'off'
        log_lock_waits: 'on'
        log_temp_files: 0
        log_line_prefix: '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

        # Tuning
        random_page_cost: 1.1
        effective_io_concurrency: 200
        default_statistics_target: 100
        idle_in_transaction_session_timeout: '10min'
        statement_timeout: '60s'

  initdb:
    - encoding: UTF8
    - data-checksums

  post_bootstrap: /usr/local/bin/post-bootstrap.sh

  pg_hba:
    - host replication replicator 172.35.0.0/16 scram-sha-256
    - host all all 172.35.0.0/16 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  users:
    admin:
      password: changeme_admin_2025
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: PATRONI_NAME:5432
  data_dir: /var/lib/postgresql/data
  pgpass: /tmp/pgpass0
  authentication:
    superuser:
      username: postgres
      password: POSTGRES_PASSWORD
    replication:
      username: replicator
      password: REPL_PASSWORD
  pg_hba:
    - local all all trust
    - host replication replicator 127.0.0.1/32 scram-sha-256
    - host replication replicator 172.35.0.0/16 scram-sha-256
    - host all all 172.35.0.0/16 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  parameters:
    unix_socket_directories: '/var/run/postgresql'

  create_replica_methods:
    - basebackup
  basebackup:
    checkpoint: fast
    max-rate: '100M'

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
