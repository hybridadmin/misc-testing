; =============================================================================
; PgBouncer configuration for Patroni PostgreSQL cluster
; Connection pooling in front of HAProxy
; =============================================================================

[databases]
; Connect through HAProxy primary port for read-write
appdb = host=haproxy port=5050 dbname=appdb
; Direct read-only pool through HAProxy replica port
appdb_ro = host=haproxy port=5051 dbname=appdb
; Admin/default database
postgres = host=haproxy port=5050 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool settings
pool_mode = transaction
max_client_conn = 400
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_idle_timeout = 600
server_connect_timeout = 5
server_login_retry = 3
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin access
admin_users = postgres
stats_users = postgres

; TLS (disabled for internal Docker network)
; client_tls_sslmode = disable
; server_tls_sslmode = disable
