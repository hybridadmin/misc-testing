# =============================================================================
# HAProxy configuration for Patroni PostgreSQL cluster
# Routes read-write traffic to the primary, read-only to replicas
# Uses Patroni REST API for health checking
# =============================================================================

global
    maxconn 1000
    log stdout format raw local0

defaults
    mode tcp
    log global
    retries 3
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    timeout check 5s

# =============================================================================
# Stats UI — http://localhost:7000/stats
# =============================================================================
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node

# =============================================================================
# Primary (read-write) — port 5050
# Routes to whichever Patroni node returns 200 on GET /primary
# =============================================================================
listen postgres_primary
    bind *:5050
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions maxconn 100
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# =============================================================================
# Replicas (read-only) — port 5051
# Routes to nodes that return 200 on GET /replica (excludes primary)
# =============================================================================
listen postgres_replicas
    bind *:5051
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions maxconn 100
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008
