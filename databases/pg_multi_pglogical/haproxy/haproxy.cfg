# =============================================================================
# HAProxy Configuration for PostgreSQL Multi-Master Cluster (pglogical variant)
# =============================================================================

global
    maxconn 20000
    log stdout format raw local0 info
    stats socket /tmp/haproxy.sock mode 660 level admin
    nbthread 4
    tune.bufsize 32768
    tune.maxrewrite 1024

defaults
    mode tcp
    log global
    retries 3
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout check 3s
    timeout queue 30s

listen stats
    mode http
    bind *:7200
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats admin if TRUE
    stats auth admin:changeme_haproxy_2025

listen pg_write
    bind *:5632
    mode tcp
    balance roundrobin
    option pgsql-check user postgres
    default-server inter 3s fall 3 rise 2 maxconn 3000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node2 pg-node2:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node3 pg-node3:5432 check agent-check agent-port 5480 agent-inter 5s

listen pg_read
    bind *:5633
    mode tcp
    balance leastconn
    option pgsql-check user postgres
    default-server inter 3s fall 3 rise 2 maxconn 5000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node2 pg-node2:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node3 pg-node3:5432 check agent-check agent-port 5480 agent-inter 5s
