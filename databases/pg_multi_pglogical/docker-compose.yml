# =============================================================================
# PostgreSQL 18 Multi-Master Cluster with pglogical + Valkey
# =============================================================================
# Architecture:
#   3x PostgreSQL 18        - Multi-master via pglogical (all nodes accept writes)
#   1x HAProxy              - Load balancer (write:5632, read:5633)
#   1x Valkey master        - Cache layer
#   2x Valkey replicas      - Cache read replicas
#   3x Valkey Sentinels     - Cache HA / automatic failover
#
# Total: 10 services
# =============================================================================

name: pg-multimaster-pglogical-cluster

x-pg-common: &pg-common
  build:
    context: .
    dockerfile: postgres/Dockerfile
  restart: unless-stopped
  shm_size: '512mb'
  init: true
  networks:
    - pg-cluster-net
  env_file: .env
  environment:
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
    POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
    ALL_NODES: pg-node1,pg-node2,pg-node3
    SETUP_REPLICATION: "true"
  volumes:
    - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro

x-valkey-common: &valkey-common
  image: valkey/valkey:9
  restart: unless-stopped
  networks:
    - pg-cluster-net

services:
  # ===========================================================================
  # PostgreSQL Multi-Master Nodes (pglogical)
  # ===========================================================================
  pg-node1:
    <<: *pg-common
    container_name: mmp-pg-node1
    hostname: pg-node1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node1
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE1:-pg-mmp-node1}
    volumes:
      - pg-node1-data:/var/lib/postgresql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool1:/var/spool/pgbackrest
      - pgbackrest-log1:/var/log/pgbackrest
    ports:
      - "5641:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg-node2:
    <<: *pg-common
    container_name: mmp-pg-node2
    hostname: pg-node2
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node2
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE2:-pg-mmp-node2}
    volumes:
      - pg-node2-data:/var/lib/postgresql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool2:/var/spool/pgbackrest
      - pgbackrest-log2:/var/log/pgbackrest
    ports:
      - "5642:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg-node3:
    <<: *pg-common
    container_name: mmp-pg-node3
    hostname: pg-node3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node3
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE3:-pg-mmp-node3}
    volumes:
      - pg-node3-data:/var/lib/postgresql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool3:/var/spool/pgbackrest
      - pgbackrest-log3:/var/log/pgbackrest
    ports:
      - "5643:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # HAProxy
  # ===========================================================================
  haproxy-pg:
    image: haproxy:3.1-alpine
    container_name: mmp-haproxy-pg
    hostname: haproxy-pg
    restart: unless-stopped
    networks:
      - pg-cluster-net
    depends_on:
      pg-node1:
        condition: service_healthy
      pg-node2:
        condition: service_healthy
      pg-node3:
        condition: service_healthy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HAPROXY_WRITE_PORT:-5632}:5632"
      - "${HAPROXY_READ_PORT:-5633}:5633"
      - "${HAPROXY_STATS_PORT:-7200}:7200"
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Valkey Cache Cluster
  # ===========================================================================
  valkey-master:
    <<: *valkey-common
    container_name: mmp-valkey-master
    hostname: valkey-master
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --save "900 1"
      --save "300 10"
      --save "60 10000"
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-master-data:/data
    ports:
      - "${VALKEY_PORT:-6579}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  valkey-replica1:
    <<: *valkey-common
    container_name: mmp-valkey-replica1
    hostname: valkey-replica1
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --replicaof valkey-master 6379
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --replica-read-only yes
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-replica1-data:/data
    ports:
      - "6580:6379"
    depends_on:
      valkey-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey-replica2:
    <<: *valkey-common
    container_name: mmp-valkey-replica2
    hostname: valkey-replica2
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --replicaof valkey-master 6379
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --replica-read-only yes
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-replica2-data:/data
    ports:
      - "6581:6379"
    depends_on:
      valkey-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey-sentinel1:
    <<: *valkey-common
    container_name: mmp-valkey-sentinel1
    hostname: valkey-sentinel1
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel1-data:/data
    ports:
      - "${VALKEY_SENTINEL_PORT:-26579}:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

  valkey-sentinel2:
    <<: *valkey-common
    container_name: mmp-valkey-sentinel2
    hostname: valkey-sentinel2
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel2-data:/data
    ports:
      - "26580:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

  valkey-sentinel3:
    <<: *valkey-common
    container_name: mmp-valkey-sentinel3
    hostname: valkey-sentinel3
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel3-data:/data
    ports:
      - "26581:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

# =============================================================================
# Networks
# =============================================================================
networks:
  pg-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CLUSTER_SUBNET:-172.31.0.0/16}

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pg-node1-data:
    driver: local
  pg-node2-data:
    driver: local
  pg-node3-data:
    driver: local
  pgbackrest-repo:
    driver: local
  pgbackrest-spool1:
    driver: local
  pgbackrest-spool2:
    driver: local
  pgbackrest-spool3:
    driver: local
  pgbackrest-log1:
    driver: local
  pgbackrest-log2:
    driver: local
  pgbackrest-log3:
    driver: local
  valkey-master-data:
    driver: local
  valkey-replica1-data:
    driver: local
  valkey-replica2-data:
    driver: local
  valkey-sentinel1-data:
    driver: local
  valkey-sentinel2-data:
    driver: local
  valkey-sentinel3-data:
    driver: local
