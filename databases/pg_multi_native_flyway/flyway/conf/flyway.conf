# =============================================================================
# Flyway Configuration for Multi-Master Cluster
# =============================================================================
# This file contains default settings. The actual JDBC URL is overridden
# at runtime by manage.sh to target each node sequentially.
#
# NOTE: flyway_schema_history is EXCLUDED from logical replication publications
# so each node maintains its own independent migration tracking.
# =============================================================================

flyway.schemas=public
flyway.defaultSchema=public
flyway.locations=filesystem:/flyway/sql
flyway.connectRetries=5
flyway.connectRetriesInterval=3
flyway.validateMigrationNaming=true
flyway.cleanDisabled=true
flyway.baselineOnMigrate=false

# Table name for migration tracking (default)
flyway.table=flyway_schema_history
