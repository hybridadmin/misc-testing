# =============================================================================
# Valkey Sentinel Configuration
# Monitors Valkey master and triggers automatic failover
# =============================================================================

port 26379
bind 0.0.0.0

sentinel monitor valkey-master valkey-master 6379 2
sentinel auth-pass valkey-master ${VALKEY_PASSWORD}
sentinel down-after-milliseconds valkey-master 5000
sentinel failover-timeout valkey-master 30000
sentinel parallel-syncs valkey-master 1

# Sentinel itself
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
