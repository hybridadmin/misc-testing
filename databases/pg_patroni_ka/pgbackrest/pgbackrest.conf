# =============================================================================
# pgBackRest Configuration — pg_patroni_ka
# Single stanza for the Patroni-managed cluster (1 primary + 2 replicas)
# =============================================================================
#
# This file is baked into the Docker image at /etc/pgbackrest/pgbackrest.conf
# All 3 nodes share the same config (same cluster, same system-id).
#
# Stanza: pg-patroni-ka
#   - pg1-path must match patroni_template.yml data_dir
#   - repo1-path is the shared Docker volume mounted on all nodes
# =============================================================================

[pg-patroni-ka]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql

[global]
repo1-path=/var/lib/pgbackrest
repo1-type=posix
repo1-retention-full=2
repo1-retention-diff=3
repo1-retention-archive=2
compress-type=lz4
compress-level=1
archive-async=y
spool-path=/var/spool/pgbackrest
start-fast=y
process-max=2
delta=y
log-level-console=warn
log-path=/var/log/pgbackrest

[global:archive-push]
compress-level=3
log-level-console=info
