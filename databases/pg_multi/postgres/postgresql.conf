# =============================================================================
# PostgreSQL 18 Multi-Master Configuration
# Optimized for logical replication between 3 writable nodes
# =============================================================================

# --- Connection Handling ---
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 5

# --- Memory (tuned for 2GB Docker VM shared among 3 nodes) ---
shared_buffers = '256MB'
effective_cache_size = '768MB'
work_mem = '4MB'
maintenance_work_mem = '64MB'
huge_pages = 'off'

# --- WAL & Logical Replication (CRITICAL for multi-master) ---
wal_level = 'logical'
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = '512MB'
wal_buffers = '16MB'
min_wal_size = '256MB'
max_wal_size = '1GB'
wal_compression = 'zstd'
synchronous_commit = 'on'

# --- Logical Replication Workers ---
max_logical_replication_workers = 10
max_worker_processes = 16
max_sync_workers_per_subscription = 4

# --- Conflict Detection ---
track_commit_timestamp = 'on'

# --- Checkpointing ---
checkpoint_timeout = '15min'
checkpoint_completion_target = 0.9

# --- Query Planner ---
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# --- Parallelism ---
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# --- Logging ---
log_min_messages = 'log'
log_min_duration_statement = 500
log_checkpoints = 'on'
log_connections = 'off'
log_disconnections = 'off'
log_lock_waits = 'on'
log_temp_files = 0
log_autovacuum_min_duration = 0
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
# Logical replication conflicts are logged at LOG level (insert_exists,
# update_origin_differs, delete_missing, etc.). log_min_messages = 'log'
# ensures these are captured. Check with: docker logs mm-pg-node1 | grep -i conflict

# --- Autovacuum (aggressive for high-write multi-master workloads) ---
autovacuum_max_workers = 5
autovacuum_naptime = '30s'
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_cost_delay = '2ms'
autovacuum_vacuum_cost_limit = 1000

# --- Misc ---
hot_standby = 'on'
hot_standby_feedback = 'on'
jit = 'on'
track_activity_query_size = 4096
idle_in_transaction_session_timeout = '10min'
statement_timeout = '60s'
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# --- Authentication ---
password_encryption = 'scram-sha-256'
