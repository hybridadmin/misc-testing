# =============================================================================
# PostgreSQL 18 Multi-Master Cluster with Native Logical Replication + keepalived VIP + Valkey
# =============================================================================
# Architecture:
#   3x PostgreSQL 18        - Multi-master via native logical replication
#                             (CREATE PUBLICATION / CREATE SUBSCRIPTION with origin=none)
#   keepalived on each node - Floating VIP (active/passive, one node at a time)
#   1x Valkey master        - Cache layer
#   2x Valkey replicas      - Cache read replicas
#   3x Valkey Sentinels     - Cache HA / automatic failover
#
# Total: 9 services (no HAProxy, no pglogical — keepalived runs inside PG containers)
#
# The VIP (172.33.0.100) floats between nodes.
# Only one node holds the VIP at a time. If that node fails, keepalived
# automatically moves the VIP to the next healthiest node (~1-3s failover).
# =============================================================================

name: pg-multimaster-native-ka-cluster

x-pg-common: &pg-common
  build:
    context: .
    dockerfile: postgres/Dockerfile
  restart: unless-stopped
  shm_size: '512mb'
  init: true
  # NET_ADMIN + NET_RAW required for keepalived to add/remove VIP on eth0
  cap_add:
    - NET_ADMIN
    - NET_RAW
  networks:
    pg-cluster-net: {}
  env_file: .env
  environment:
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
    POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
    ALL_NODES: pg-node1,pg-node2,pg-node3
    SETUP_REPLICATION: "true"
    KEEPALIVED_VIP: ${KEEPALIVED_VIP:-172.33.0.100}
    KEEPALIVED_VRID: ${KEEPALIVED_VRID:-52}
    PG_NODE1_IP: ${PG_NODE1_IP:-172.33.0.11}
    PG_NODE2_IP: ${PG_NODE2_IP:-172.33.0.12}
    PG_NODE3_IP: ${PG_NODE3_IP:-172.33.0.13}
  volumes:
    - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    - ./keepalived/keepalived.conf.tmpl:/etc/keepalived/keepalived.conf.tmpl:ro

x-valkey-common: &valkey-common
  image: valkey/valkey:9
  restart: unless-stopped
  networks:
    pg-cluster-net: {}

services:
  # ===========================================================================
  # PostgreSQL Multi-Master Nodes (native logical replication + keepalived)
  # ===========================================================================
  pg-node1:
    <<: *pg-common
    container_name: mmn-pg-node1
    hostname: pg-node1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node1
      MY_IP: ${PG_NODE1_IP:-172.33.0.11}
      KEEPALIVED_VIP: ${KEEPALIVED_VIP:-172.33.0.100}
      KEEPALIVED_VRID: ${KEEPALIVED_VRID:-52}
      PG_NODE1_IP: ${PG_NODE1_IP:-172.33.0.11}
      PG_NODE2_IP: ${PG_NODE2_IP:-172.33.0.12}
      PG_NODE3_IP: ${PG_NODE3_IP:-172.33.0.13}
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE1:-pg-mmn-node1}
    volumes:
      - pg-node1-data:/var/lib/postgresql
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool1:/var/spool/pgbackrest
      - pgbackrest-log1:/var/log/pgbackrest
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./keepalived/keepalived.conf.tmpl:/etc/keepalived/keepalived.conf.tmpl:ro
    networks:
      pg-cluster-net:
        ipv4_address: ${PG_NODE1_IP:-172.33.0.11}
    ports:
      - "5841:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg-node2:
    <<: *pg-common
    container_name: mmn-pg-node2
    hostname: pg-node2
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node2
      MY_IP: ${PG_NODE2_IP:-172.33.0.12}
      KEEPALIVED_VIP: ${KEEPALIVED_VIP:-172.33.0.100}
      KEEPALIVED_VRID: ${KEEPALIVED_VRID:-52}
      PG_NODE1_IP: ${PG_NODE1_IP:-172.33.0.11}
      PG_NODE2_IP: ${PG_NODE2_IP:-172.33.0.12}
      PG_NODE3_IP: ${PG_NODE3_IP:-172.33.0.13}
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE2:-pg-mmn-node2}
    volumes:
      - pg-node2-data:/var/lib/postgresql
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool2:/var/spool/pgbackrest
      - pgbackrest-log2:/var/log/pgbackrest
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./keepalived/keepalived.conf.tmpl:/etc/keepalived/keepalived.conf.tmpl:ro
    networks:
      pg-cluster-net:
        ipv4_address: ${PG_NODE2_IP:-172.33.0.12}
    ports:
      - "5842:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg-node3:
    <<: *pg-common
    container_name: mmn-pg-node3
    hostname: pg-node3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPL_USER: ${POSTGRES_REPL_USER}
      POSTGRES_REPL_PASSWORD: ${POSTGRES_REPL_PASSWORD}
      ALL_NODES: pg-node1,pg-node2,pg-node3
      SETUP_REPLICATION: "true"
      NODE_NAME: pg-node3
      MY_IP: ${PG_NODE3_IP:-172.33.0.13}
      KEEPALIVED_VIP: ${KEEPALIVED_VIP:-172.33.0.100}
      KEEPALIVED_VRID: ${KEEPALIVED_VRID:-52}
      PG_NODE1_IP: ${PG_NODE1_IP:-172.33.0.11}
      PG_NODE2_IP: ${PG_NODE2_IP:-172.33.0.12}
      PG_NODE3_IP: ${PG_NODE3_IP:-172.33.0.13}
      PGBACKREST_STANZA: ${BACKUP_STANZA_NODE3:-pg-mmn-node3}
    volumes:
      - pg-node3-data:/var/lib/postgresql
      - pgbackrest-repo:/var/lib/pgbackrest
      - pgbackrest-spool3:/var/spool/pgbackrest
      - pgbackrest-log3:/var/log/pgbackrest
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./keepalived/keepalived.conf.tmpl:/etc/keepalived/keepalived.conf.tmpl:ro
    networks:
      pg-cluster-net:
        ipv4_address: ${PG_NODE3_IP:-172.33.0.13}
    ports:
      - "5843:5432"
    healthcheck:
      test: ["CMD", "/usr/local/bin/pg-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Valkey Cache Cluster
  # ===========================================================================
  valkey-master:
    <<: *valkey-common
    container_name: mmn-valkey-master
    hostname: valkey-master
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --save "900 1"
      --save "300 10"
      --save "60 10000"
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-master-data:/data
    ports:
      - "${VALKEY_PORT:-6779}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  valkey-replica1:
    <<: *valkey-common
    container_name: mmn-valkey-replica1
    hostname: valkey-replica1
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --replicaof valkey-master 6379
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --replica-read-only yes
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-replica1-data:/data
    ports:
      - "6780:6379"
    depends_on:
      valkey-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey-replica2:
    <<: *valkey-common
    container_name: mmn-valkey-replica2
    hostname: valkey-replica2
    command: >
      valkey-server
      --port 6379
      --bind 0.0.0.0
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --replicaof valkey-master 6379
      --maxmemory ${VALKEY_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lfu
      --replica-read-only yes
      --hz 100
      --dynamic-hz yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --tcp-keepalive 300
      --maxclients 10000
      --repl-diskless-sync yes
      --loglevel notice
    volumes:
      - valkey-replica2-data:/data
    ports:
      - "6781:6379"
    depends_on:
      valkey-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey-sentinel1:
    <<: *valkey-common
    container_name: mmn-valkey-sentinel1
    hostname: valkey-sentinel1
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel1-data:/data
    ports:
      - "${VALKEY_SENTINEL_PORT:-26779}:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

  valkey-sentinel2:
    <<: *valkey-common
    container_name: mmn-valkey-sentinel2
    hostname: valkey-sentinel2
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel2-data:/data
    ports:
      - "26780:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

  valkey-sentinel3:
    <<: *valkey-common
    container_name: mmn-valkey-sentinel3
    hostname: valkey-sentinel3
    entrypoint: ["/bin/bash", "/scripts/sentinel-entrypoint.sh"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - ./valkey/sentinel.conf:/etc/valkey/sentinel-template.conf:ro
      - ./scripts/sentinel-entrypoint.sh:/scripts/sentinel-entrypoint.sh:ro
      - valkey-sentinel3-data:/data
    ports:
      - "26781:26379"
    depends_on:
      valkey-master:
        condition: service_healthy
      valkey-replica1:
        condition: service_healthy
      valkey-replica2:
        condition: service_healthy

# =============================================================================
# Networks
# =============================================================================
networks:
  pg-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CLUSTER_SUBNET:-172.33.0.0/16}

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pg-node1-data:
    driver: local
  pg-node2-data:
    driver: local
  pg-node3-data:
    driver: local
  pgbackrest-repo:
    driver: local
  pgbackrest-spool1:
    driver: local
  pgbackrest-spool2:
    driver: local
  pgbackrest-spool3:
    driver: local
  pgbackrest-log1:
    driver: local
  pgbackrest-log2:
    driver: local
  pgbackrest-log3:
    driver: local
  valkey-master-data:
    driver: local
  valkey-replica1-data:
    driver: local
  valkey-replica2-data:
    driver: local
  valkey-sentinel1-data:
    driver: local
  valkey-sentinel2-data:
    driver: local
  valkey-sentinel3-data:
    driver: local
