# =============================================================================
# PostgreSQL HBA Configuration for Multi-Master Cluster
# =============================================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             all                                     trust

# Loopback (IPv4 + IPv6)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker network - all users (IPv4 + IPv6)
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# Replication connections from any Docker host (IPv4 + IPv6)
host    replication     replicator      0.0.0.0/0               scram-sha-256
host    replication     postgres        0.0.0.0/0               scram-sha-256
host    replication     replicator      ::/0                    scram-sha-256
host    replication     postgres        ::/0                    scram-sha-256
