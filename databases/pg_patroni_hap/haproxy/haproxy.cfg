# =============================================================================
# HAProxy Configuration for PostgreSQL HA Cluster
# Routes writes -> primary, reads -> replicas via Patroni health checks
# =============================================================================

global
    maxconn 20000
    log stdout format raw local0 info
    stats socket /tmp/haproxy.sock mode 660 level admin
    # Performance tuning
    nbthread 4
    tune.bufsize 32768
    tune.maxrewrite 1024

defaults
    mode tcp
    log global
    retries 3
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout check 3s
    timeout queue 30s

# -----------------------------------------------------------------------------
# Stats UI - accessible at http://<host>:7000/stats
# -----------------------------------------------------------------------------
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats admin if TRUE
    stats auth admin:changeme_haproxy_2025

# -----------------------------------------------------------------------------
# WRITE endpoint (port 5432) -> routes to PRIMARY only
# Patroni returns HTTP 200 on /primary for the current leader
# -----------------------------------------------------------------------------
listen pg_write
    bind *:5432
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 3000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check port 8008
    server pg-node2 pg-node2:5432 check port 8008
    server pg-node3 pg-node3:5432 check port 8008

# -----------------------------------------------------------------------------
# READ endpoint (port 5433) -> load balanced across REPLICAS
# Patroni returns HTTP 200 on /replica for healthy standbys
# Falls back to primary if no replicas available
# -----------------------------------------------------------------------------
listen pg_read
    bind *:5433
    mode tcp
    balance leastconn
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 5000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check port 8008
    server pg-node2 pg-node2:5432 check port 8008
    server pg-node3 pg-node3:5432 check port 8008

# -----------------------------------------------------------------------------
# READ-WRITE endpoint (port 5434) -> any healthy node (primary preferred)
# Useful for read-heavy workloads that can tolerate slight lag
# Patroni returns HTTP 200 on /health for any healthy node
# -----------------------------------------------------------------------------
listen pg_read_write
    bind *:5434
    mode tcp
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 5000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check port 8008
    server pg-node2 pg-node2:5432 check port 8008
    server pg-node3 pg-node3:5432 check port 8008
