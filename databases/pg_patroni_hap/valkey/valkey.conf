# =============================================================================
# Valkey Master Configuration
# Optimized for caching PostgreSQL query results at high throughput
# =============================================================================

# --- Network ---
bind 0.0.0.0
port 6379
protected-mode yes
requirepass ${VALKEY_PASSWORD}
masterauth ${VALKEY_PASSWORD}
tcp-backlog 511
tcp-keepalive 300
timeout 0

# --- Memory ---
maxmemory 2gb
maxmemory-policy allkeys-lfu
# LFU is superior to LRU for database caching:
# it evicts least-frequently-used keys, keeping hot query results cached

# --- Persistence (RDB snapshots for cache warming after restart) ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# --- AOF (disabled for pure caching - enable if cache durability matters) ---
appendonly no

# --- Performance ---
hz 100
dynamic-hz yes
io-threads 4
io-threads-do-reads yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# --- Replication ---
replica-lazy-flush yes
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-load on-empty-db

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 256

# --- Clients ---
maxclients 10000

# --- Logging ---
loglevel notice
