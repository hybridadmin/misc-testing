# =============================================================================
# Valkey Replica Configuration
# =============================================================================

bind 0.0.0.0
port 6379
protected-mode yes
requirepass ${VALKEY_PASSWORD}
masterauth ${VALKEY_PASSWORD}
tcp-backlog 511
tcp-keepalive 300
timeout 0

# --- This node is a replica ---
replicaof valkey-master 6379

# --- Memory ---
maxmemory 2gb
maxmemory-policy allkeys-lfu
replica-read-only yes

# --- Persistence ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

appendonly no

# --- Performance ---
hz 100
dynamic-hz yes
io-threads 2
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# --- Replication ---
replica-lazy-flush yes
repl-diskless-sync yes
repl-diskless-load on-empty-db

# --- Clients ---
maxclients 10000

loglevel notice
