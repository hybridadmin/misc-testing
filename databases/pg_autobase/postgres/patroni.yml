scope: pg-autobase
name: PATRONI_NAME

restapi:
  listen: 0.0.0.0:8008
  connect_address: PATRONI_NAME:8008

etcd3:
  hosts:
    - etcd1:2379
    - etcd2:2379
    - etcd3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    master_start_timeout: 300
    maximum_lag_on_failover: 1048576
    maximum_lag_on_replica: 104857600
    synchronous_mode: true
    synchronous_mode_strict: false
    synchronous_node_count: 1
    failsafe_mode: true
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        # --- Connection ---
        max_connections: 200
        listen_addresses: '*'
        superuser_reserved_connections: 5

        # --- Replication (autobase defaults) ---
        wal_level: logical
        max_wal_senders: 20
        max_replication_slots: 20
        hot_standby: 'on'
        hot_standby_feedback: 'on'
        synchronous_commit: 'on'
        wal_log_hints: 'on'
        wal_compression: 'on'

        # --- Memory (conservative for ~1.9GB Docker VM) ---
        shared_buffers: '128MB'
        effective_cache_size: '384MB'
        work_mem: '8MB'
        maintenance_work_mem: '64MB'
        huge_pages: 'off'

        # --- WAL ---
        wal_buffers: '8MB'
        min_wal_size: '128MB'
        max_wal_size: '512MB'
        checkpoint_completion_target: 0.9
        checkpoint_timeout: '10min'
        archive_mode: 'on'
        archive_timeout: 300

        # --- Logging (autobase-style) ---
        log_destination: 'stderr'
        logging_collector: 'off'
        log_min_duration_statement: 1000
        log_checkpoints: 'on'
        log_connections: 'off'
        log_disconnections: 'off'
        log_lock_waits: 'on'
        log_temp_files: 0
        log_line_prefix: '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
        track_io_timing: 'on'
        track_activity_query_size: 4096
        track_functions: 'all'

        # --- Query Planner (SSD-optimized, autobase defaults) ---
        random_page_cost: 1.1
        seq_page_cost: 1
        effective_io_concurrency: 200
        default_statistics_target: 500
        jit: 'off'

        # --- Autovacuum (autobase aggressive defaults) ---
        autovacuum: 'on'
        autovacuum_max_workers: 3
        autovacuum_analyze_scale_factor: 0.01
        autovacuum_vacuum_scale_factor: 0.01
        autovacuum_vacuum_cost_limit: 500
        autovacuum_vacuum_cost_delay: 2
        autovacuum_naptime: '1s'

        # --- Connection tuning ---
        idle_in_transaction_session_timeout: '10min'
        statement_timeout: '60s'
        tcp_keepalives_count: 10
        tcp_keepalives_idle: 300
        tcp_keepalives_interval: 30

        # --- Extensions ---
        shared_preload_libraries: 'pg_stat_statements'
        pg_stat_statements.max: 10000
        pg_stat_statements.track: 'all'
        pg_stat_statements.track_planning: 'on'
        pg_stat_statements.track_utility: 'off'
        pg_stat_statements.save: 'on'

        # --- Security ---
        password_encryption: 'scram-sha-256'
        max_locks_per_transaction: 512

  initdb:
    - encoding: UTF8
    - data-checksums

  post_bootstrap: /usr/local/bin/post-bootstrap.sh

  pg_hba:
    - host replication replicator 172.36.0.0/16 scram-sha-256
    - host all all 172.36.0.0/16 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  users:
    admin:
      password: changeme_admin_2025
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: PATRONI_NAME:5432
  data_dir: /var/lib/postgresql/data
  pgpass: /tmp/pgpass0
  authentication:
    superuser:
      username: postgres
      password: POSTGRES_PASSWORD
    replication:
      username: replicator
      password: REPL_PASSWORD
  pg_hba:
    - local all all trust
    - host replication replicator 127.0.0.1/32 scram-sha-256
    - host replication replicator 172.36.0.0/16 scram-sha-256
    - host all all 172.36.0.0/16 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  parameters:
    unix_socket_directories: '/var/run/postgresql'
    archive_command: 'pgbackrest --stanza=pg-autobase archive-push %p'

  # pgBackRest first, basebackup as fallback (autobase pattern)
  create_replica_methods:
    - pgbackrest
    - basebackup
  pgbackrest:
    command: 'pgbackrest --stanza=pg-autobase --delta restore'
    keep_data: true
    no_params: true
  basebackup:
    checkpoint: fast
    max-rate: '100M'

  recovery_conf:
    restore_command: 'pgbackrest --stanza=pg-autobase archive-get %f "%p"'

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
