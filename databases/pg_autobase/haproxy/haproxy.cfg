# =============================================================================
# HAProxy configuration — Autobase-style 4-backend routing
# Uses Patroni REST API health checks on port 8008
# =============================================================================

global
    maxconn 10000
    log stdout format raw local0

defaults
    mode tcp
    log global
    retries 3
    timeout connect 5s
    timeout client 60m
    timeout server 60m
    timeout queue 5s
    timeout check 15s

# =============================================================================
# Stats UI — http://localhost:7000/stats
# =============================================================================
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node

# =============================================================================
# Master (read-write) — port 5000
# Routes to whichever Patroni node returns 200 on OPTIONS /primary
# =============================================================================
listen postgres_master
    bind *:5000
    option httpchk OPTIONS /primary
    http-check expect status 200
    default-server inter 3s fastinter 1s fall 3 rise 4 on-marked-down shutdown-sessions maxconn 1000
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# =============================================================================
# All Replicas (read-only) — port 5001
# Routes to nodes returning 200 on OPTIONS /replica
# =============================================================================
listen postgres_replicas
    bind *:5001
    balance roundrobin
    option httpchk OPTIONS /replica
    http-check expect status 200
    default-server inter 3s fastinter 1s fall 3 rise 2 on-marked-down shutdown-sessions maxconn 1000
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# =============================================================================
# Synchronous Replicas only — port 5002
# Routes to nodes returning 200 on OPTIONS /sync
# =============================================================================
listen postgres_replicas_sync
    bind *:5002
    balance roundrobin
    option httpchk OPTIONS /sync
    http-check expect status 200
    default-server inter 3s fastinter 1s fall 3 rise 2 on-marked-down shutdown-sessions maxconn 1000
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# =============================================================================
# Async Replicas only — port 5003
# Routes to nodes returning 200 on OPTIONS /async
# =============================================================================
listen postgres_replicas_async
    bind *:5003
    balance roundrobin
    option httpchk OPTIONS /async
    http-check expect status 200
    default-server inter 3s fastinter 1s fall 3 rise 2 on-marked-down shutdown-sessions maxconn 1000
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008
