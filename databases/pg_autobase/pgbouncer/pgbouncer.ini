; =============================================================================
; PgBouncer configuration — autobase-style
; Connection pooling in front of HAProxy
; =============================================================================

[databases]
; Read-write through HAProxy master port
appdb = host=haproxy port=5000 dbname=appdb
; Read-only through HAProxy replicas port
appdb_ro = host=haproxy port=5001 dbname=appdb
; Sync replicas only
appdb_sync = host=haproxy port=5002 dbname=appdb
; Async replicas only
appdb_async = host=haproxy port=5003 dbname=appdb
; Admin/default database
postgres = host=haproxy port=5000 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool settings (autobase-inspired)
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 200
max_prepared_statements = 1024

; Timeouts
server_idle_timeout = 600
server_connect_timeout = 5
server_login_retry = 3
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

; Performance
pkt_buf = 8192
listen_backlog = 4096
so_reuseport = 1
server_reset_query = DISCARD ALL

; Startup parameter passthrough
ignore_startup_parameters = extra_float_digits,geqo,search_path

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin access
admin_users = postgres
stats_users = postgres
