# =============================================================================
# HAProxy Configuration for PostgreSQL Multi-Master Cluster
# All nodes accept both reads and writes — round-robin distribution
# =============================================================================

global
    maxconn 20000
    log stdout format raw local0 info
    stats socket /tmp/haproxy.sock mode 660 level admin
    # Performance tuning
    nbthread 4
    tune.bufsize 32768
    tune.maxrewrite 1024

defaults
    mode tcp
    log global
    retries 3
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout check 3s
    timeout queue 30s

# -----------------------------------------------------------------------------
# Stats UI - accessible at http://<host>:7060/stats
# -----------------------------------------------------------------------------
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats admin if TRUE
    stats auth admin:changeme_haproxy_2025

# -----------------------------------------------------------------------------
# WRITE endpoint (port 5432) -> round-robin across ALL multi-master nodes
# All nodes accept writes in a multi-master setup
# Health checks:
#   - pgsql-check: verifies PG is accepting connections (binary check)
#   - agent-check: replication health agent on port 5480 adjusts weight/state
#     (drains node if subscriptions disabled or errors detected)
# -----------------------------------------------------------------------------
listen pg_write
    bind *:5432
    mode tcp
    balance roundrobin
    option pgsql-check user postgres
    default-server inter 3s fall 3 rise 2 maxconn 3000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node2 pg-node2:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node3 pg-node3:5432 check agent-check agent-port 5480 agent-inter 5s

# -----------------------------------------------------------------------------
# READ endpoint (port 5433) -> load balanced across ALL nodes (leastconn)
# In multi-master, any node can serve reads
# Agent-check adjusts weight for degraded nodes (lagging replication)
# -----------------------------------------------------------------------------
listen pg_read
    bind *:5433
    mode tcp
    balance leastconn
    option pgsql-check user postgres
    default-server inter 3s fall 3 rise 2 maxconn 5000 on-marked-down shutdown-sessions

    server pg-node1 pg-node1:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node2 pg-node2:5432 check agent-check agent-port 5480 agent-inter 5s
    server pg-node3 pg-node3:5432 check agent-check agent-port 5480 agent-inter 5s
