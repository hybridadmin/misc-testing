# =============================================================================
# pgBackRest reference configuration — NOT directly mounted into containers.
#
# The entrypoint script generates a per-node /etc/pgbackrest/pgbackrest.conf
# at startup because each primary (node1, node2) has a different PostgreSQL
# system-id from independent initdb. pgBackRest requires separate stanzas
# for clusters with different system-ids:
#
#   Stanza pg-spock-node1: node1 (primary) + node3 (streaming replica)
#   Stanza pg-spock-node2: node2 (primary) + node4 (streaming replica)
#
# This file documents the template. See scripts/entrypoint.sh generate_pgbackrest_conf().
# =============================================================================

[global]
repo1-path=/var/lib/pgbackrest
repo1-type=posix

# Retention
repo1-retention-full=2
repo1-retention-diff=3
repo1-retention-archive=2
repo1-retention-archive-type=full

# Performance
process-max=2
compress-type=lz4
compress-level=1

# Reliability
start-fast=y
stop-auto=y
delta=y
resume=n

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Archive async (improves WAL archiving performance)
archive-async=y
spool-path=/var/spool/pgbackrest

[global:archive-push]
compress-level=3

[global:archive-get]
process-max=2

# Stanza (replaced at runtime with pg-spock-node1 or pg-spock-node2)
[pg-spock-nodeN]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-socket-path=/var/run/postgresql
