[global]
# Repository -- shared Docker volume (both primaries mount the same volume)
repo1-path=/var/lib/pgbackrest
repo1-type=posix

# Retention
repo1-retention-full=2
repo1-retention-diff=3
repo1-retention-archive=2
repo1-retention-archive-type=full

# Performance
process-max=2
compress-type=lz4
compress-level=1

# Reliability
start-fast=y
stop-auto=y
delta=y
resume=n

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Archive async (improves WAL archiving performance)
archive-async=y
spool-path=/var/spool/pgbackrest

[global:archive-push]
compress-level=3

[global:archive-get]
process-max=2

# Stanza -- matches cluster name
[pg-spock]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-socket-path=/var/run/postgresql
