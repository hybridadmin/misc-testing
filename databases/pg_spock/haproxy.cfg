###############################################################################
# HAProxy configuration for PG18 Spock multi-master cluster
#
# Ports (internal — host ports configured in docker-compose.yml):
#   5000 -> R/W (round-robin to node1, node2 — both Spock multi-master)
#   5001 -> RO  (round-robin to node3, node4 — streaming replicas)
#   7000 -> Stats dashboard
#
# Autobase-style tuning:
#   - maxconn 10000
#   - 60-minute client/server timeouts (long-running queries)
#   - pgsql-check health checks every 3s
#   - on-marked-down shutdown-sessions (immediate client disconnect)
#   - fall 3 / rise 2 for fast convergence
###############################################################################

global
    log stdout format raw local0
    maxconn 10000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  clitcpka
    timeout connect 5s
    timeout client  60m
    timeout server  60m
    retries 3

# --- Stats UI ---------------------------------------------------------
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats admin if TRUE

# --- R/W Frontend (node1 + node2, both accept writes) -----------------
listen pg_rw
    bind *:5000
    mode tcp
    option pgsql-check user postgres
    balance roundrobin
    default-server inter 3s fastinter 1s fall 3 rise 2 on-marked-down shutdown-sessions

    server node1 node1:5432 check
    server node2 node2:5432 check

# --- RO Frontend (node3 + node4, streaming replicas) ------------------
listen pg_ro
    bind *:5001
    mode tcp
    option pgsql-check user postgres
    balance roundrobin
    default-server inter 3s fastinter 1s fall 3 rise 2 on-marked-down shutdown-sessions

    server node3 node3:5432 check
    server node4 node4:5432 check
