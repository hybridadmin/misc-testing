# =============================================================================
# pgBackRest reference configuration — NOT directly mounted into containers.
#
# Each entrypoint script generates a per-node /etc/pgbackrest/pgbackrest.conf
# at startup because each independent PG cluster has a different system-id.
# pgBackRest requires separate stanzas for clusters with different system-ids:
#
#   Stanza pg-citus-coordinator: coordinator (primary) + coordinator-standby
#     (same system-id — standby is pg_basebackup clone of primary)
#
#   Stanza pg-citus-worker1: worker1 (independent initdb)
#   Stanza pg-citus-worker2: worker2 (independent initdb)
#
# This file documents the template. See entrypoint scripts for generation.
# =============================================================================

[global]
repo1-path=/var/lib/pgbackrest
repo1-type=posix

# Retention
repo1-retention-full=2
repo1-retention-diff=3
repo1-retention-archive=2
repo1-retention-archive-type=full

# Performance
process-max=2
compress-type=lz4
compress-level=1

# Reliability
start-fast=y
delta=y
resume=n

# Logging
log-level-console=warn
log-path=/var/log/pgbackrest

# Archive async (improves WAL archiving performance)
archive-async=y
spool-path=/var/spool/pgbackrest

[global:archive-push]
compress-level=3
log-level-console=info

[global:archive-get]
process-max=2

# Stanza (replaced at runtime per node)
# PGDATA for Citus image is /var/lib/postgresql/18/docker
[pg-citus-STANZA_NAME]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql
