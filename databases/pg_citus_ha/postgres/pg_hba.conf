# =============================================================================
# PostgreSQL HBA Configuration for Citus Distributed Cluster
# =============================================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             all                                     trust

# Loopback (IPv4 + IPv6)
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Citus inter-node communication (coordinator <-> workers)
# Trust within the cluster subnet — Citus requires passwordless inter-node access
host    all             all             172.34.0.0/16           trust
host    replication     all             172.34.0.0/16           trust

# External connections - password required (IPv4 + IPv6)
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# Replication connections from any Docker host (IPv4 + IPv6)
host    replication     replicator      0.0.0.0/0               scram-sha-256
host    replication     postgres        0.0.0.0/0               scram-sha-256
host    replication     replicator      ::/0                    scram-sha-256
host    replication     postgres        ::/0                    scram-sha-256
