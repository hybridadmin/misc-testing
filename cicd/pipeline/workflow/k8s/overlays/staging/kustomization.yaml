apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pipeline-staging

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: staging

images:
  - name: ghcr.io/OWNER/pipeline
    newTag: main

patches:
  - target:
      kind: Deployment
      name: pipeline-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
