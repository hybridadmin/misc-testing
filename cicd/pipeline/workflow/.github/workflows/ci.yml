name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Test
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run tests
        run: pytest app/tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # 2. Build & Push Container Image
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only build on push to main/develop (not on PRs)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git SHA (always)
            type=sha,format=short
            # Tag with branch name
            type=ref,event=branch
            # Tag with semver if tagged
            type=semver,pattern={{version}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────
  # 3. Update Kubernetes Manifests
  # ──────────────────────────────────────────────
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "overlay=staging" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "overlay=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Update image tag in Kustomize overlay
        run: |
          OVERLAY="${{ steps.env.outputs.overlay }}"
          NEW_TAG="sha-${GITHUB_SHA::7}"
          echo "Updating $OVERLAY overlay to image tag: $NEW_TAG"

          # Use kustomize to set the new image tag
          cd k8s/overlays/$OVERLAY
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$NEW_TAG

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${{ steps.env.outputs.overlay }} image to sha-${GITHUB_SHA::7}"
          git push
