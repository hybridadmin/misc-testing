apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-app-production
  namespace: argocd
  labels:
    app.kubernetes.io/environment: production
spec:
  project: pipeline-app
  source:
    # Replace with your actual repo URL
    repoURL: https://github.com/OWNER/pipeline.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: pipeline-production
  # Production: NO automated sync — requires manual approval via Argo CD UI/CLI
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
