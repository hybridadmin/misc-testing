# =============================================================================
# pgBackRest Configuration Reference (turboapi)
# =============================================================================
# This file is NOT mounted into containers. It serves as documentation.
# The actual pgbackrest.conf is generated at runtime by pg-entrypoint.sh
# with the correct stanza name from the PGBACKREST_STANZA env var.
#
# Architecture:
#   3 PG nodes with pglogical multi-master replication
#   Each node has its own system-id (independent initdb) -> 3 stanzas
#
# Stanzas:
#   turboapi-node1  -> pg_node1
#   turboapi-node2  -> pg_node2
#   turboapi-node3  -> pg_node3
#
# Shared volume:
#   pgbackrest-repo  -> /var/lib/pgbackrest (all 3 nodes)
#
# Per-node volumes:
#   pgbackrest-spool{N} -> /var/spool/pgbackrest (async archive spool)
#   pgbackrest-log{N}   -> /var/log/pgbackrest   (log files)
# =============================================================================

[turboapi-node1]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql

[turboapi-node2]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql

[turboapi-node3]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-socket-path=/var/run/postgresql

[global]
repo1-path=/var/lib/pgbackrest
repo1-type=posix
repo1-retention-full=2
repo1-retention-diff=3
repo1-retention-archive=2
compress-type=lz4
compress-level=1
archive-async=y
spool-path=/var/spool/pgbackrest
start-fast=y
process-max=2
log-level-console=warn
log-path=/var/log/pgbackrest

[global:archive-push]
compress-level=3
log-level-console=info
