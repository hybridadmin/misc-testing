# ============================================================
# pg_hba.conf - PostgreSQL Client Authentication
# Used by both pg_node1 and pg_node2
# ============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ─── Local (unix socket) connections ─────────────────────────
local   all             all                                     trust

# ─── Loopback ────────────────────────────────────────────────
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# ─── Replication connections (pglogical uses regular conns) ──
host    replication     all             172.28.0.0/16           md5
host    replication     all             0.0.0.0/0               md5

# ─── Docker backend network (compose subnet 172.28.0.0/16) ──
host    all             all             172.28.0.0/16           md5

# ─── Fallback: any host with password ───────────────────────
host    all             all             0.0.0.0/0               md5
host    all             all             ::/0                    md5
