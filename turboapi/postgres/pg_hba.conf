# PostgreSQL Client Authentication Configuration
# =============================================

# Replication connections - trust for internal Docker networking
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
host    replication     replicator      0.0.0.0/0               md5
host    replication     replicator      ::0/0                   md5

# Local app connections
local   app_db         appuser                                 md5
host    app_db         appuser         127.0.0.1/32            md5
host    app_db         appuser         ::1/128                 md5

# Docker network - allow all services to connect
host    app_db         appuser         172.16.0.0/12           md5
host    all            appuser         172.16.0.0/12           md5

# Local superuser
local   all            postgres                                trust
local   all            all                                     trust
host    all            all             127.0.0.1/32            md5
host    all            all             ::1/128                 md5
