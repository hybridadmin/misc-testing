version: "3.9"

x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-appuser}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_prod_2024}
  REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD:-repl_password_secure_2024}
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-postgres-common: &postgres-common
  build:
    context: ./postgres
    dockerfile: Dockerfile
  environment:
    <<: *common-env
    POSTGRES_DB: app_db
    POSTGRES_INITDB_ARGS: "-E UTF8"
  volumes:
    - postgres_data:/var/lib/postgresql
    - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
  networks:
    - postgres_cluster
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  postgres_provider:
    <<: *postgres-common
    container_name: turboapi_postgres_provider
    command:
      - postgres
      # - -cshared_preload_libraries=pglogical
      - -cmax_connections=100
      - -cshared_buffers=128MB
      - -ceffective_cache_size=256MB
      - -cwork_mem=8MB
      - -cmaintenance_work_mem=64MB
      - -ccheckpoint_completion_target=0.9
      - -cwal_buffers=8MB
      - -cmax_wal_size=1GB
      - -clog_duration=off
      - -clog_min_duration_statement=1000
      - -clog_lock_waits=off
      - -clog_connections=off
      - -clog_disconnections=off
      - -cwal_level=logical
      - -cmax_replication_slots=10
      - -cmax_wal_senders=10
    ports:
      - "5432:5432"
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d app_db"]

  postgres_replica1:
    <<: *postgres-common
    container_name: turboapi_postgres_replica1
    environment:
      <<: *common-env
      POSTGRES_DB: app_db
    volumes:
      - postgres_data1:/var/lib/postgresql
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/.pgpass:/var/lib/postgresql/.pgpass:ro
    depends_on:
      postgres_provider:
        condition: service_healthy
    command:
      - postgres
      # - -cshared_preload_libraries=pglogical
      - -cmax_connections=100
      - -cshared_buffers=64MB
      - -ceffective_cache_size=128MB
      - -cwork_mem=4MB
      - -cmaintenance_work_mem=32MB
      - -ccheckpoint_completion_target=0.9
      - -cwal_buffers=4MB
      - -cmax_wal_size=512MB
      - -clog_duration=off
      - -clog_min_duration_statement=1000
      - -clog_lock_waits=off
      - -clog_connections=off
      - -clog_disconnections=off
      - -cwal_level=logical
      - -cmax_replication_slots=5
      - -cmax_wal_senders=5
      - -chot_standby=on
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d app_db"]

  postgres_replica2:
    <<: *postgres-common
    container_name: turboapi_postgres_replica2
    environment:
      <<: *common-env
      POSTGRES_DB: app_db
    volumes:
      - postgres_data2:/var/lib/postgresql
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/.pgpass:/var/lib/postgresql/.pgpass:ro
    depends_on:
      postgres_provider:
        condition: service_healthy
    command:
      - postgres
      # - -cshared_preload_libraries=pglogical
      - -cmax_connections=100
      - -cshared_buffers=64MB
      - -ceffective_cache_size=128MB
      - -cwork_mem=4MB
      - -cmaintenance_work_mem=32MB
      - -ccheckpoint_completion_target=0.9
      - -cwal_buffers=4MB
      - -cmax_wal_size=512MB
      - -clog_duration=off
      - -clog_min_duration_statement=1000
      - -clog_lock_waits=off
      - -clog_connections=off
      - -clog_disconnections=off
      - -cwal_level=logical
      - -cmax_replication_slots=5
      - -cmax_wal_senders=5
      - -chot_standby=on
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d app_db"]

  valkey:
    image: valkey/valkey:9.0.1
    container_name: turboapi_valkey
    command: valkey-server /usr/local/etc/valkey/valkey.conf
    volumes:
      - valkey_data:/data
      - ./valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "valkey-cli", "ping"]
    networks:
      - postgres_cluster
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  app_fastapi:
    build:
      context: ./app_fastapi
      dockerfile: Dockerfile
    container_name: turboapi_fastapi
    environment:
      <<: *common-env
      APP_NAME: "fastapi"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      VALKEY_URL: "redis://valkey:6379/0"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-20}"
      DATABASE_MAX_OVERFLOW: "${DATABASE_MAX_OVERFLOW:-10}"
      CACHE_DEFAULT_TTL: "${CACHE_DEFAULT_TTL:-300}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-4}"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8001"
      UVICORN_TIMEOUT_KEEP_ALIVE: "65"
      UVICORN_LIMIT_CONCURRENCY: "1000"
      UVICORN_ACCESS_LOG: "false"
      VALKEY_MAX_CONNECTIONS: "100"
    ports:
      - "8001:8001"
    depends_on:
      postgres_provider:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    networks:
      - postgres_cluster
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  app_turbo:
    build:
      context: ./app_turbo
      dockerfile: Dockerfile
    container_name: turboapi_turbo
    environment:
      <<: *common-env
      APP_NAME: "turboapi"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_replica1:5432/app_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_replica1:5432/app_db"
      VALKEY_URL: "redis://valkey:6379/0"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-20}"
      DATABASE_MAX_OVERFLOW: "${DATABASE_MAX_OVERFLOW:-10}"
      CACHE_DEFAULT_TTL: "${CACHE_DEFAULT_TTL:-300}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-4}"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8002"
      UVICORN_TIMEOUT_KEEP_ALIVE: "65"
      UVICORN_LIMIT_CONCURRENCY: "2000"
      UVICORN_ACCESS_LOG: "false"
      VALKEY_MAX_CONNECTIONS: "100"
    ports:
      - "8002:8002"
    depends_on:
      postgres_replica1:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    networks:
      - postgres_cluster
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  postgres_data1:
  postgres_data2:
  valkey_data:

networks:
  postgres_cluster:
    driver: bridge
