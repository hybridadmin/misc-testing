# ============================================================
# Valkey Sentinel configuration
# Monitors the primary "valkey-primary" and auto-failovers
# ============================================================

port 26379
sentinel monitor valkey-primary valkey 6379 2
sentinel down-after-milliseconds valkey-primary 5000
sentinel failover-timeout valkey-primary 10000
sentinel parallel-syncs valkey-primary 1

# Resolve hostnames (docker DNS)
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
