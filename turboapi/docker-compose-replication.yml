version: "3.9"

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-appuser}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_prod_2024}
  REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD:-repl_password_secure_2024}
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

services:
  postgres_provider:
    image: postgres:18.3
    container_name: turboapi_postgres_provider
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_prod_2024}
      POSTGRES_DB: app_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_provider_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/.pgpass:/var/lib/postgresql/.pgpass:ro
    command:
      - postgres
      - -cmax_connections=200
      - -cshared_buffers=256MB
      - -ceffective_cache_size=512MB
      - -cwork_mem=16MB
      - -cmaintenance_work_mem=128MB
      - -ccheckpoint_completion_target=0.9
      - -cwal_buffers=16MB
      - -cdefault_statistics_target=100
      - -crandom_page_cost=1.1
      - -cdynamic_shared_memory_type=posix
      - -cmax_wal_size=2GB
      - -cmin_wal_size=80MB
      - -clog_duration=off
      - -clog_min_duration_statement=1000
      - -clog_lock_waits=off
      - -clog_connections=off
      - -clog_disconnections=off
      - -cwal_level=logical
      - -cmax_replication_slots=10
      - -cmax_wal_senders=10
      - -cwal_keep_size=1GB
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d app_db"]
    networks:
      - backend
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  postgres_replica:
    image: postgres:18.3
    container_name: turboapi_postgres_replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_prod_2024}
      POSTGRES_DB: app_db
    volumes:
      - postgres_replica_data:/var/lib/postgresql
      - ./postgres/init_replica.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/.pgpass:/var/lib/postgresql/.pgpass:ro
    command:
      - postgres
      - -cmax_connections=200
      - -cshared_buffers=128MB
      - -ceffective_cache_size=256MB
      - -cwork_mem=8MB
      - -cmaintenance_work_mem=64MB
      - -ccheckpoint_completion_target=0.9
      - -cwal_buffers=8MB
      - -ccreate_slot=logical
      - -clog_duration=off
      - -clog_min_duration_statement=1000
      - -clog_lock_waits=off
      - -clog_connections=off
      - -clog_disconnections=off
      - -cwal_level=logical
      - -cmax_replication_slots=10
      - -cmax_wal_senders=10
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d app_db"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  app_fastapi:
    build:
      context: ./app_fastapi
      dockerfile: Dockerfile
    container_name: turboapi_fastapi
    environment:
      <<: *common-env
      APP_NAME: "fastapi"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      VALKEY_URL: "redis://valkey:6379/0"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-20}"
      DATABASE_MAX_OVERFLOW: "${DATABASE_MAX_OVERFLOW:-10}"
      CACHE_DEFAULT_TTL: "${CACHE_DEFAULT_TTL:-300}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-4}"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8001"
      UVICORN_TIMEOUT_KEEP_ALIVE: "65"
      UVICORN_LIMIT_CONCURRENCY: "1000"
      UVICORN_ACCESS_LOG: "false"
      VALKEY_MAX_CONNECTIONS: "100"
    ports:
      - "8001:8001"
    depends_on:
      postgres_provider:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  app_turbo:
    build:
      context: ./app_turbo
      dockerfile: Dockerfile
    container_name: turboapi_turbo
    environment:
      <<: *common-env
      APP_NAME: "turboapi"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme_prod_2024}@postgres_provider:5432/app_db"
      VALKEY_URL: "redis://valkey:6379/0"
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-20}"
      DATABASE_MAX_OVERFLOW: "${DATABASE_MAX_OVERFLOW:-10}"
      CACHE_DEFAULT_TTL: "${CACHE_DEFAULT_TTL:-300}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-4}"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8002"
      UVICORN_TIMEOUT_KEEP_ALIVE: "65"
      UVICORN_LIMIT_CONCURRENCY: "2000"
      UVICORN_ACCESS_LOG: "false"
      VALKEY_MAX_CONNECTIONS: "100"
    ports:
      - "8002:8002"
    depends_on:
      postgres_provider:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  valkey:
    image: valkey/valkey:9.0.1
    container_name: turboapi_valkey
    command: valkey-server /usr/local/etc/valkey/valkey.conf
    volumes:
      - valkey_data:/data
      - ./valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "valkey-cli", "ping"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  postgres_provider_data:
  postgres_replica_data:
  valkey_data:

networks:
  backend:
    driver: bridge
