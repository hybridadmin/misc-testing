# =============================================================================
# Valkey 9 Configuration - Production Tuned for Forgejo
# =============================================================================
# This file is mounted read-only into the Valkey container.
# The password is injected via --requirepass on the command line.
# =============================================================================

# -- Network ------------------------------------------------------------------
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# -- Memory -------------------------------------------------------------------
maxmemory 200mb
maxmemory-policy allkeys-lru
maxclients 10000

# -- Persistence (AOF) -------------------------------------------------------
# AOF provides durability for sessions and queue data.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# -- Persistence (RDB snapshot as safety net) ---------------------------------
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# -- Logging ------------------------------------------------------------------
loglevel notice

# -- Latency ------------------------------------------------------------------
latency-monitor-threshold 100
slowlog-log-slower-than 10000
slowlog-max-len 128

# -- Security -----------------------------------------------------------------
# Disable dangerous commands that could wipe data or expose internals.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
