# =============================================================================
# Forgejo Production Docker Compose
# =============================================================================
# Services:
#   - forgejo     : Forgejo server (rootless image)
#   - postgres    : PostgreSQL 18 database
#   - valkey      : Valkey 9 (Redis-compatible) for cache + sessions
#   - backup      : Automated daily PostgreSQL backups with retention
#
# Usage:
#   1. cp .env.example .env && $EDITOR .env   # fill in secrets
#   2. docker compose up -d
#   3. docker compose logs -f forgejo          # watch startup
#
# Best practices applied:
#   - Rootless container image (no root process)
#   - Named volumes for data persistence
#   - Health checks on every service
#   - Explicit resource limits (CPU + memory)
#   - Network isolation (frontend / backend split)
#   - Read-only filesystems where possible
#   - Security options (no-new-privileges)
#   - Secrets via environment variables from .env
#   - Restart policies for resilience
#   - Dependency ordering with health-check conditions
#   - Minimal port exposure (only Forgejo ports published)
#   - PostgreSQL with tuned settings
#   - Valkey with AOF persistence, memory limits, dangerous commands disabled
#   - Automated backup with configurable retention
# =============================================================================

networks:
  # Public-facing network - only Forgejo exposes ports here
  frontend:
    driver: bridge
  # Internal network - database and cache are never exposed
  backend:
    driver: bridge
    internal: true

volumes:
  forgejo-data:
  forgejo-config:
  postgres-data:
  valkey-data:
  backup-data:

services:
  # ---------------------------------------------------------------------------
  # Forgejo - Git forge (rootless)
  # ---------------------------------------------------------------------------
  forgejo:
    image: ${FORGEJO_IMAGE:-codeberg.org/forgejo/forgejo:14-rootless}
    container_name: forgejo
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:2222"
    volumes:
      - forgejo-data:/var/lib/gitea
      - forgejo-config:/etc/gitea
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}

      # -- Server ---------------------------------------------------------------
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN:-localhost}
      - FORGEJO__server__SSH_DOMAIN=${FORGEJO_SSH_DOMAIN:-localhost}
      - FORGEJO__server__ROOT_URL=${FORGEJO_ROOT_URL:-http://localhost:3000}
      - FORGEJO__server__SSH_PORT=${FORGEJO_SSH_PORT:-2222}
      - FORGEJO__server__SSH_LISTEN_PORT=2222
      - FORGEJO__server__LFS_START_SERVER=true
      - FORGEJO__server__OFFLINE_MODE=true

      # -- Database -------------------------------------------------------------
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=${POSTGRES_DB:-forgejo}
      - FORGEJO__database__USER=${POSTGRES_USER:-forgejo}
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD}
      - FORGEJO__database__SSL_MODE=disable
      - FORGEJO__database__LOG_SQL=false

      # -- Cache (Valkey) -------------------------------------------------------
      - FORGEJO__cache__ADAPTER=redis
      - FORGEJO__cache__HOST=redis://:${VALKEY_PASSWORD}@valkey:6379/0?pool_size=100&idle_timeout=180s

      # -- Session (Valkey) -----------------------------------------------------
      - FORGEJO__session__PROVIDER=redis
      - FORGEJO__session__PROVIDER_CONFIG=redis://:${VALKEY_PASSWORD}@valkey:6379/1?pool_size=100&idle_timeout=180s
      - FORGEJO__session__COOKIE_SECURE=false
      - FORGEJO__session__COOKIE_NAME=forgejo_session

      # -- Queue (Valkey) -------------------------------------------------------
      - FORGEJO__queue__TYPE=redis
      - FORGEJO__queue__CONN_STR=redis://:${VALKEY_PASSWORD}@valkey:6379/2?pool_size=100&idle_timeout=180s

      # -- Security -------------------------------------------------------------
      - FORGEJO__security__SECRET_KEY=${FORGEJO_SECRET_KEY}
      - FORGEJO__security__INTERNAL_TOKEN=${FORGEJO_INTERNAL_TOKEN}
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__security__PASSWORD_COMPLEXITY=lower,upper,digit,spec
      - FORGEJO__security__MIN_PASSWORD_LENGTH=12
      - FORGEJO__security__PASSWORD_CHECK_PWN=true

      # -- LFS ------------------------------------------------------------------
      - FORGEJO__lfs__JWT_SECRET=${FORGEJO_LFS_JWT_SECRET}

      # -- Service --------------------------------------------------------------
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__service__ENABLE_NOTIFY_MAIL=false
      - FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE=true
      - FORGEJO__service__DEFAULT_ALLOW_CREATE_ORGANIZATION=true
      - FORGEJO__service__ENABLE_CAPTCHA=true
      - FORGEJO__service__DEFAULT_USER_VISIBILITY=limited

      # -- Log ------------------------------------------------------------------
      - FORGEJO__log__LEVEL=info
      - FORGEJO__log__MODE=console

      # -- Indexer --------------------------------------------------------------
      - FORGEJO__indexer__ISSUE_INDEXER_TYPE=bleve
      - FORGEJO__indexer__REPO_INDEXER_ENABLED=true
      - FORGEJO__indexer__REPO_INDEXER_TYPE=bleve

      # -- Mailer (disabled by default; uncomment and configure for production) -
      # - FORGEJO__mailer__ENABLED=true
      # - FORGEJO__mailer__PROTOCOL=smtps
      # - FORGEJO__mailer__SMTP_ADDR=smtp.example.com
      # - FORGEJO__mailer__SMTP_PORT=465
      # - FORGEJO__mailer__USER=noreply@example.com
      # - FORGEJO__mailer__PASSWD=smtp_password
      # - FORGEJO__mailer__FROM=noreply@example.com

      # -- Actions (CI/CD) -----------------------------------------------------
      - FORGEJO__actions__ENABLED=true

      # -- Cron jobs ------------------------------------------------------------
      - FORGEJO__cron__ENABLED=true
      - FORGEJO__cron__RUN_AT_START=false

      # -- Other ----------------------------------------------------------------
      - FORGEJO__other__SHOW_FOOTER_VERSION=false
      - FORGEJO__other__SHOW_FOOTER_TEMPLATE_LOAD_TIME=false

    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 (Trixie)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-trixie
    container_name: forgejo-postgres
    restart: unless-stopped
    networks:
      - backend
    volumes:
      # PG 18 changed the default data directory to /var/lib/postgresql/data/pgdata
      # via the PGDATA env var. We pin it explicitly to keep the volume mount simple.
      - postgres-data:/var/lib/postgresql/data/pgdata
      - ./config/postgres-initdb.sh:/docker-entrypoint-initdb.d/initdb.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forgejo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-forgejo}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      # -- Connection settings --------------------------------------------------
      - "-c" 
      - "max_connections=200"
      # -- Memory ---------------------------------------------------------------
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      # -- WAL ------------------------------------------------------------------
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_level=replica"
      # -- Logging --------------------------------------------------------------
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=off"
      - "-c"
      - "log_disconnections=off"
      - "-c"
      - "log_lock_waits=on"
      # -- Locale ---------------------------------------------------------------
      - "-c"
      - "timezone=UTC"
      - "-c"
      - "log_timezone=UTC"
      # -- Security -------------------------------------------------------------
      - "-c"
      - "password_encryption=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgejo} -d ${POSTGRES_DB:-forgejo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Valkey 9 (Redis-compatible cache, session store, and queue backend)
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:9-alpine
    container_name: forgejo-valkey
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - valkey-data:/data
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf", "--requirepass", "${VALKEY_PASSWORD}"]
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Automated PostgreSQL Backup
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:18-trixie
    container_name: forgejo-backup
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - backup-data:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-forgejo}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-forgejo}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        # Run initial backup on startup
        /usr/local/bin/backup.sh
        # Then sleep until the next scheduled time and repeat.
        # Default: run every 24 hours (86400 seconds).
        while sleep "$${BACKUP_INTERVAL_SECONDS:-86400}"; do
          /usr/local/bin/backup.sh
        done
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
