# =============================================================================
# Sample Azure Pipeline that consumes the webhook-only template
# =============================================================================
# This is the equivalent of a GitHub Actions workflow that calls the reusable
# workflow via `uses: org/shared-workflows/.github/workflows/webhook-only.yml`.
#
# Place this file in the consuming repository as `azure-pipelines.yml` and
# adjust the resource reference to point to your shared templates repo.
# =============================================================================

trigger:
  tags:
    include:
      - '*'

resources:
  repositories:
    - repository: shared-templates
      type: git
      name: 'YourProject/shared-workflows'
      ref: refs/heads/main
      # endpoint: 'your-github-service-connection'  # Only needed for GitHub repos

extends:
  template: shared/webhook-only.yml@shared-templates
  parameters:
    trigger_webhook: true
    # pool_x86: 'ubuntu-latest'                       # Default
    # secrets_variable_group: 'moya-webhook-only-secrets'  # Default
