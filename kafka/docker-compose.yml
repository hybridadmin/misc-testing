###############################################################################
# Nginx → Filebeat → Kafka 4.2 (KRaft) logging stack
###############################################################################
name: nginx-kafka-logging

services:
  # ---------------------------------------------------------------------------
  # Kafka 4.2 — KRaft mode (no ZooKeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"       # PLAINTEXT listener (internal Docker)
      - "9093:9093"       # EXTERNAL listener (host access)
      - "9094:9094"       # CONTROLLER listener
    environment:
      # ---- Node identity ----
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9094"
      KAFKA_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS: "kafka:9094"
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"    # fixed for reproducibility

      # ---- Listeners ----
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # ---- Replication & durability ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"          # single-node; raise to 3 in multi-broker
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"

      # ---- Log management (broker storage, NOT application logs) ----
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_LOG_RETENTION_HOURS: "168"                     # 7 days
      KAFKA_LOG_RETENTION_BYTES: "1073741824"              # 1 GiB per partition
      KAFKA_LOG_SEGMENT_BYTES: "536870912"                 # 512 MiB segments
      KAFKA_LOG_CLEANUP_POLICY: "delete"
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"      # every 5 min

      # ---- Performance tuning ----
      KAFKA_NUM_NETWORK_THREADS: "3"
      KAFKA_NUM_IO_THREADS: "8"
      KAFKA_SOCKET_SEND_BUFFER_BYTES: "102400"
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: "102400"
      KAFKA_SOCKET_REQUEST_MAX_BYTES: "104857600"          # 100 MiB
      KAFKA_MESSAGE_MAX_BYTES: "1048576"                   # 1 MiB max message
      KAFKA_REPLICA_FETCH_MAX_BYTES: "1048576"

      # ---- Topic defaults ----
      KAFKA_NUM_PARTITIONS: "6"                            # sensible default for parallelism
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # ---- Compression ----
      KAFKA_COMPRESSION_TYPE: "producer"                   # honour producer-side compression

      # ---- Group coordinator ----
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "3000"

      # ---- Metadata ----
      KAFKA_METADATA_MAX_RETENTION_MS: "604800000"         # 7 days

    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Init container — create the nginx-logs Kafka topic
  # ---------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be fully ready..."
        sleep 5
        echo "Creating topic nginx-logs..."
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic nginx-logs \
          --partitions 6 \
          --replication-factor 1 \
          --config retention.ms=604800000 \
          --config retention.bytes=1073741824 \
          --config cleanup.policy=delete \
          --config compression.type=lz4 \
          --config max.message.bytes=1048576 \
          --config segment.bytes=536870912
        echo "Topic nginx-logs created (or already exists)."
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --describe \
          --topic nginx-logs
    networks:
      - logging
    restart: "no"

  # ---------------------------------------------------------------------------
  # Nginx + Filebeat — combined container (JSON logs → Kafka)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: nginx-filebeat:latest
    container_name: nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./filebeat/filebeat.yml:/etc/filebeat/filebeat.yml:ro
      - filebeat-data:/var/lib/filebeat
    networks:
      - logging
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka UI — optional web console for inspecting topics / messages
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    networks:
      - logging
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ClickHouse — OLAP database consuming from Kafka
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"       # HTTP interface
      - "9000:9000"       # Native TCP interface
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./sql/clickhouse.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./clickhouse/users-override.xml:/etc/clickhouse-server/users.d/users-override.xml:ro
    environment:
      CLICKHOUSE_DB: "nginx_logs"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - logging
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  kafka-data:
    driver: local
  filebeat-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local

networks:
  logging:
    driver: bridge
