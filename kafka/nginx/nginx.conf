###############################################################################
# Nginx — main configuration with JSON structured logging
#
# The JSON log format matches the ClickHouse `kafka_log` table schema exactly.
# All 32 fields are emitted. Fields that may be empty ("-") are mapped to safe
# defaults so ClickHouse can parse them as their expected types.
###############################################################################
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ------------------------------------------------------------------
    # Map directives — convert empty / "-" values to safe defaults
    # so that ClickHouse can parse numeric types without errors.
    # ------------------------------------------------------------------

    # upstream_response_time: "-" or "" → 0 (Float64)
    map $upstream_response_time $urt_safe {
        default $upstream_response_time;
        ""      0;
        "-"     0;
    }

    # upstream_status: may be empty when there is no upstream
    map $upstream_status $upstream_status_safe {
        default $upstream_status;
        ""      "";
        "-"     "";
    }

    # connection_time: only available in stream module / newer nginx;
    # may not be set for plain HTTP — use $request_time as a proxy.
    # $connection_time was added in nginx 1.19.10 for HTTP.
    map $connection_time $connection_time_safe {
        default $connection_time;
        ""      0;
        "-"     0;
    }

    # ------------------------------------------------------------------
    # JSON-formatted access log — matches ClickHouse kafka_log schema
    # ------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"timestamp":$msec,'
            '"remote_addr":"$remote_addr",'
            '"http_host":"$host",'
            '"server_name":"$server_name",'
            '"server_addr":"$server_addr",'
            '"protocol":"$server_protocol",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"request_length":$request_length,'
            '"status":"$status",'
            '"bytes_sent":$bytes_sent,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_authorization":"$http_authorization",'
            '"request_time":$request_time,'
            '"compression_used":"$gzip_ratio",'
            '"upstream_response_time":$urt_safe,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status_safe",'
            '"ssl_protocol":"$ssl_protocol",'
            '"ssl_cipher":"$ssl_cipher",'
            '"ssl_session_reused":"$ssl_session_reused",'
            '"ssl_server_name":"$ssl_server_name",'
            '"connection":$connection,'
            '"connection_requests":$connection_requests,'
            '"connection_time":$connection_time_safe,'
            '"quic_sent":0,'
            '"quic_received":0,'
            '"tcpinfo_bytes_sent":0,'
            '"tcpinfo_bytes_received":0,'
            '"tcpinfo_segs_out":0,'
            '"tcpinfo_segs_in":0,'
            '"tcpinfo_data_segs_out":0,'
            '"tcpinfo_data_segs_in":0'
        '}';

    # ------------------------------------------------------------------
    # Error log note: nginx doesn't support custom error_log formats,
    # so we use the standard text format. Filebeat will enrich it with
    # metadata before sending to Kafka.
    # ------------------------------------------------------------------

    access_log /var/log/nginx/access.log json_combined;

    # ------------------------------------------------------------------
    # General HTTP settings
    # ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens   off;              # hide nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    include /etc/nginx/conf.d/*.conf;
}
