---
# =============================================================================
# Common role - OS prerequisites for all Kubernetes nodes
# Handles: swap, kernel modules, sysctl, firewall, packages, time sync
# =============================================================================

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with cluster nodes
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ".*{{ hostvars[item]['inventory_hostname'] }}$"
    line: "{{ hostvars[item]['ansible_host'] }} {{ hostvars[item]['inventory_hostname'] }}"
    state: present
  loop: "{{ groups['k8s_cluster'] }}"

# ---------------------------------------------------------------------------
# Disable swap (required by kubelet)
# ---------------------------------------------------------------------------
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap entries from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  notify: reboot node

# ---------------------------------------------------------------------------
# Kernel modules required by containerd and k8s networking
# ---------------------------------------------------------------------------
- name: Load required kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/kubernetes.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

# ---------------------------------------------------------------------------
# Sysctl parameters for k8s networking
# ---------------------------------------------------------------------------
- name: Set sysctl parameters for Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: true
    state: present
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward", value: "1" }
    # Recommended for production workloads
    - { key: "net.ipv4.tcp_keepalive_time", value: "600" }
    - { key: "net.ipv4.tcp_keepalive_intvl", value: "60" }
    - { key: "net.ipv4.tcp_keepalive_probes", value: "5" }
    - { key: "vm.max_map_count", value: "262144" }
    - { key: "fs.inotify.max_user_instances", value: "8192" }
    - { key: "fs.inotify.max_user_watches", value: "524288" }

# ---------------------------------------------------------------------------
# Firewall - disable ufw if present (we'll use network policies instead)
# ---------------------------------------------------------------------------
- name: Disable ufw firewall
  ansible.builtin.systemd:
    name: ufw
    state: stopped
    enabled: false
  failed_when: false

# ---------------------------------------------------------------------------
# Install base packages
# ---------------------------------------------------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - nfs-common
      - open-iscsi
      - jq
      - bash-completion
      - chrony
    state: present

# ---------------------------------------------------------------------------
# Time synchronisation (critical for certificate validation and etcd)
# ---------------------------------------------------------------------------
- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true

# ---------------------------------------------------------------------------
# Security hardening basics
# ---------------------------------------------------------------------------
- name: Disable core dumps
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-no-core-dumps.conf
    content: |
      * hard core 0
      * soft core 0
    mode: "0644"
