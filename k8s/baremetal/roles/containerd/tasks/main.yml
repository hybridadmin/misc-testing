---
# =============================================================================
# Containerd role - Install and configure containerd as the CRI
# =============================================================================

# ---------------------------------------------------------------------------
# Install containerd from Docker's official apt repository
# ---------------------------------------------------------------------------
- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install containerd
  ansible.builtin.apt:
    name: "containerd.io={{ containerd_version }}"
    state: present
    update_cache: true

- name: Hold containerd package version
  ansible.builtin.dpkg_selections:
    name: containerd.io
    selection: hold

# ---------------------------------------------------------------------------
# Configure containerd with systemd cgroup driver (required by kubelet)
# ---------------------------------------------------------------------------
- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config
  ansible.builtin.copy:
    content: "{{ containerd_default_config.stdout }}"
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: restart containerd

- name: Enable SystemdCgroup in containerd config
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '(\s+)SystemdCgroup\s*='
    line: '            SystemdCgroup = true'
    state: present
  notify: restart containerd

- name: Set sandbox image to match Kubernetes version
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '(\s+)sandbox_image\s*='
    line: '    sandbox_image = "registry.k8s.io/pause:3.10"'
    state: present
  notify: restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true

- name: Flush handlers to restart containerd if config changed
  ansible.builtin.meta: flush_handlers
