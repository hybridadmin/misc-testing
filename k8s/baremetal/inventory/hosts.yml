---
# =============================================================================
# Bare-Metal Kubernetes Cluster Inventory
# =============================================================================
# Update the ansible_host values with your actual node IPs.
# The control_plane group should have exactly 1 node for a small cluster.
# The workers group should have 2-3 nodes.
# =============================================================================

all:
  children:
    control_plane:
      hosts:
        cp-01:
          ansible_host: 192.168.1.10

    workers:
      hosts:
        worker-01:
          ansible_host: 192.168.1.11
        worker-02:
          ansible_host: 192.168.1.12
        # worker-03:
        #   ansible_host: 192.168.1.13

    # Convenience group: all k8s nodes
    k8s_cluster:
      children:
        control_plane:
        workers:
