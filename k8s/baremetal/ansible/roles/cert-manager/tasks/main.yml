---
# =============================================================================
# cert-manager role
# Automated TLS certificate management with Let's Encrypt support.
# =============================================================================

- name: Add cert-manager Helm repo
  ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
  register: helm_repo
  changed_when: "'has been added' in helm_repo.stdout"
  failed_when:
    - helm_repo.rc != 0
    - "'already exists' not in helm_repo.stderr"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Create cert-manager namespace
  ansible.builtin.command: kubectl create namespace cert-manager
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when:
    - ns_result.rc != 0
    - "'already exists' not in ns_result.stderr"

- name: Install cert-manager via Helm
  ansible.builtin.command: >
    helm upgrade --install cert-manager jetstack/cert-manager
    --namespace cert-manager
    --version v{{ cert_manager_version }}
    --set crds.enabled=true
    --set replicaCount=1
    --set resources.requests.cpu=50m
    --set resources.requests.memory=64Mi
    --set resources.limits.memory=128Mi
    --set prometheus.enabled=true
    --wait
    --timeout 5m
  register: certmanager_install
  changed_when: "'has been upgraded' in certmanager_install.stdout or 'has been installed' in certmanager_install.stdout"

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command: >
    kubectl -n cert-manager wait --for=condition=Ready pod
    -l app.kubernetes.io/component=webhook
    --timeout=120s
  changed_when: false

# Give the webhook a moment to start serving
- name: Wait for webhook to be fully operational
  ansible.builtin.pause:
    seconds: 15

- name: Render ClusterIssuers
  ansible.builtin.template:
    src: cluster-issuers.yml.j2
    dest: /tmp/cluster-issuers.yml
    mode: "0644"

- name: Apply ClusterIssuers (Let's Encrypt staging + production)
  ansible.builtin.command: kubectl apply -f /tmp/cluster-issuers.yml
  register: issuers_result
  changed_when: "'configured' in issuers_result.stdout or 'created' in issuers_result.stdout"

- name: Remove temporary ClusterIssuer manifest
  ansible.builtin.file:
    path: /tmp/cluster-issuers.yml
    state: absent
