---
# =============================================================================
# ArgoCD role - GitOps continuous delivery
# =============================================================================

- name: Add ArgoCD Helm repo
  ansible.builtin.command: helm repo add argo https://argoproj.github.io/argo-helm
  register: helm_repo
  changed_when: "'has been added' in helm_repo.stdout"
  failed_when:
    - helm_repo.rc != 0
    - "'already exists' not in helm_repo.stderr"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Create argocd namespace
  ansible.builtin.command: kubectl create namespace argocd
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when:
    - ns_result.rc != 0
    - "'already exists' not in ns_result.stderr"

- name: Render ArgoCD values
  ansible.builtin.template:
    src: values.yml.j2
    dest: /tmp/argocd-values.yml
    mode: "0644"

- name: Install ArgoCD via Helm
  ansible.builtin.command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace argocd
    --version {{ argocd_version }}
    --values /tmp/argocd-values.yml
    --wait
    --timeout 5m
  register: argocd_install
  changed_when: "'has been upgraded' in argocd_install.stdout or 'has been installed' in argocd_install.stdout"

- name: Remove temporary values file
  ansible.builtin.file:
    path: /tmp/argocd-values.yml
    state: absent

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command: >
    kubectl -n argocd wait --for=condition=Ready pod
    -l app.kubernetes.io/name=argocd-server
    --timeout=180s
  changed_when: false

- name: Get ArgoCD initial admin password
  ansible.builtin.command: >
    kubectl -n argocd get secret argocd-initial-admin-secret
    -o jsonpath='{.data.password}'
  register: argocd_password_b64
  changed_when: false

- name: Decode ArgoCD admin password
  ansible.builtin.set_fact:
    argocd_admin_password: "{{ argocd_password_b64.stdout | b64decode }}"

- name: Display ArgoCD access information
  ansible.builtin.debug:
    msg: |
      ===================================================
      ArgoCD has been installed successfully.
      Namespace: argocd
      Username: admin
      Password: {{ argocd_admin_password }}

      Access via port-forward:
        kubectl port-forward svc/argocd-server -n argocd 8080:443

      Or configure Ingress for external access.
      ===================================================
