---
# =============================================================================
# Monitoring role - kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
# Full observability stack deployed via Helm.
# =============================================================================

- name: Add prometheus-community Helm repo
  ansible.builtin.command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: helm_repo
  changed_when: "'has been added' in helm_repo.stdout"
  failed_when:
    - helm_repo.rc != 0
    - "'already exists' not in helm_repo.stderr"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Create monitoring namespace
  ansible.builtin.command: kubectl create namespace monitoring
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when:
    - ns_result.rc != 0
    - "'already exists' not in ns_result.stderr"

- name: Render kube-prometheus-stack values
  ansible.builtin.template:
    src: values.yml.j2
    dest: /tmp/kube-prometheus-stack-values.yml
    mode: "0644"

- name: Install kube-prometheus-stack via Helm
  ansible.builtin.command: >
    helm upgrade --install kube-prometheus-stack
    prometheus-community/kube-prometheus-stack
    --namespace monitoring
    --version {{ kube_prometheus_stack_version }}
    --values /tmp/kube-prometheus-stack-values.yml
    --wait
    --timeout 10m
  register: monitoring_install
  changed_when: "'has been upgraded' in monitoring_install.stdout or 'has been installed' in monitoring_install.stdout"

- name: Remove temporary values file
  ansible.builtin.file:
    path: /tmp/kube-prometheus-stack-values.yml
    state: absent

- name: Wait for Prometheus pods to be ready
  ansible.builtin.command: >
    kubectl -n monitoring wait --for=condition=Ready pod
    -l app.kubernetes.io/name=prometheus
    --timeout=300s
  changed_when: false
  failed_when: false   # Non-fatal if it takes longer

- name: Wait for Grafana pods to be ready
  ansible.builtin.command: >
    kubectl -n monitoring wait --for=condition=Ready pod
    -l app.kubernetes.io/name=grafana
    --timeout=180s
  changed_when: false
